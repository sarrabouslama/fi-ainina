events { worker_connections 1024; }

http {
    upstream frontend       { server frontend:3000; }
    upstream llm_service    { server llm_service:8001; }
    upstream voice_service  { server voice_service:8002; }
    upstream fall_service   { server fall_detection_service:8003; }
    upstream emotion_service{ server emotion_service:8004; }
    upstream alert_service  { server alert_service:8005; }

    server {
        listen 80;
        server_name localhost;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # P1 — LLM
        location /api/llm/ {
            proxy_pass http://llm_service/;
            proxy_set_header Host $host;
        }

        # P2 — Voice
        location /api/voice/ {
            proxy_pass http://voice_service/;
            proxy_set_header Host $host;
        }

        # P3 — Fall Detection
        location /api/fall/ {
            proxy_pass http://fall_service/;
            proxy_set_header Host $host;
        }

        # P3 — WebSocket (video stream + events)
        location /ws/fall/ {
            proxy_pass http://fall_service/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # P4 — Emotion
        location /api/emotion/ {
            proxy_pass http://emotion_service/;
            proxy_set_header Host $host;
        }

        # P5 — Alerts
        location /api/alerts/ {
            proxy_pass http://alert_service/;
            proxy_set_header Host $host;
        }
    }
}
