[pytest]
# Pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Minimum Python version coverage
minversion = 7.0

# Test collection ignore patterns
norecursedirs = __pycache__ .git .venv venv env

# Show extra summary info
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    docker: Tests requiring Docker
