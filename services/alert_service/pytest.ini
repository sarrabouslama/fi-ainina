[pytest]
# Pytest configuration

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    asyncio: async test
    integration: integration test (requires services)
    unit: unit test

# Output
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
